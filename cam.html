<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Kamera App</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 0; 
            background: #000; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden;
            /* Verhindert Textmarkierung beim schnellen Tippen */
            user-select: none; 
            -webkit-user-select: none;
        }

        #camera-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Der weiße Blitz-Effekt */
        #flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 10;
        }

        /* Obere Leiste (Home Button) */
        .top-bar {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 20;
        }

        .top-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* Untere Leiste (Controls) */
        .ui-overlay {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 40px);
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Vorschau des letzten Bildes (Galerie) */
        #preview-gallery {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background-color: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            object-fit: cover;
            cursor: pointer;
        }

        /* Der Aufnahme-Knopf: Weiß und Rund */
        #snap {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }
        #snap:active { transform: scale(0.9); background: #ddd; }

        /* Switch & Blitz Buttons */
        .icon-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            backdrop-filter: blur(5px);
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="top-btn" onclick="window.location.href='index.html'" title="Zurück zum Menü">🏠</button>
    </div>

    <div id="camera-container">
        <div id="flash-overlay"></div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <div class="ui-overlay">
        <img id="preview-gallery" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Galerie">
        
        <button id="snap"></button>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <button id="switch-cam" class="icon-btn" title="Kamera wechseln">🔄</button>
            <button id="toggle-flash" class="icon-btn" title="Blitz an/aus">⚡</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap');
        const switchBtn = document.getElementById('switch-cam');
        const flashBtn = document.getElementById('toggle-flash');
        const flashOverlay = document.getElementById('flash-overlay');
        const previewGallery = document.getElementById('preview-gallery');

        let currentStream = null;
        let useFrontCamera = false;
        let flashEnabled = false;

        // Kamera starten
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            // Blitz zurücksetzen beim Kamerawechsel
            flashEnabled = false;
            updateFlashUI();

            const constraints = {
                video: { 
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1920 }, // Versuche hohe Auflösung anzufordern
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (err) {
                alert("Kamera konnte nicht gestartet werden: " + err.message);
            }
        }

        // UI des Blitz-Buttons anpassen
        function updateFlashUI() {
            flashBtn.style.color = flashEnabled ? "#ffdb58" : "white";
            flashBtn.style.background = flashEnabled ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.5)";
        }

        // Echten Hardware-Blitz (LED) aktivieren/deaktivieren
        async function toggleHardwareTorch(enable) {
            if (!currentStream) return;
            const track = currentStream.getVideoTracks()[0];
            
            // Prüfen ob das Gerät eine Taschenlampe unterstützt
            try {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    await track.applyConstraints({
                        advanced: [{ torch: enable }]
                    });
                }
            } catch (error) {
                console.log("Hardware-Blitz wird nicht unterstützt", error);
            }
        }

        // Klick auf Blitz-Button
        flashBtn.addEventListener('click', () => {
            flashEnabled = !flashEnabled;
            updateFlashUI();
            toggleHardwareTorch(flashEnabled);
        });

        // Kamera wechseln
        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        // Foto aufnehmen & SOFORT speichern
        snapBtn.addEventListener('click', () => {
            // Bildschirm-Blitz-Effekt auslösen
            flashOverlay.style.opacity = "1";
            setTimeout(() => flashOverlay.style.opacity = "0", 150);

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Wenn die Frontkamera an ist, müssen wir das Bild spiegeln
            if (useFrontCamera) {
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
            }
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Bild in Base64 umwandeln
            const imageDataUrl = canvas.toDataURL("image/png");

            // Vorschau unten links aktualisieren
            previewGallery.src = imageDataUrl;
            
            // Automatischer Download
            const link = document.createElement('a');
            link.download = `foto_${Date.now()}.png`;
            link.href = imageDataUrl;
            link.click(); 
        });

        // Start beim Laden der Seite
        startCamera();
    </script>
</body>
</html>
