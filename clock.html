<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TimeSync v3.5</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff3b30;
            --sub: #555;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* Haupt-Zeit-Container */
        #clock-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14vw; /* Etwas kleiner, damit alles nebeneinander passt */
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5vw;
        }

        .unit { position: relative; }
        
        .sep {
            opacity: 0.3;
            margin: 0 1.5vw;
            font-weight: 300;
        }

        /* Der pulsierende Punkt ganz rechts */
        #dot-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 10vw;
            margin-left: 2vw;
        }

        #dot {
            width: 4vw;
            height: 4vw;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 59, 48, 0.4);
            animation: breath 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        @keyframes breath {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* Info Zeile */
        #info {
            margin-top: 5vh;
            font-size: 4vw;
            color: var(--sub);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Verstecke Safari UI Elemente wenn möglich */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="clock-wrapper">
        <span id="hh" class="unit">00</span>
        <span class="sep">:</span>
        <span id="mm" class="unit">00</span>
        <span class="sep">:</span>
        <span id="ss" class="unit">00</span>
        
        <div id="dot-container">
            <div id="dot"></div>
        </div>
    </div>

    <div id="info">UTC --:-- | ZONE --</div>

    <script>
        function update() {
            const now = new Date();
            const f = n => n.toString().padStart(2, '0');
            
            // Lokale Zeit Segmente
            document.getElementById('hh').innerText = f(now.getHours());
            document.getElementById('mm').innerText = f(now.getMinutes());
            document.getElementById('ss').innerText = f(now.getSeconds());
            
            // UTC & Offset
            const utc = f(now.getUTCHours()) + ':' + f(now.getUTCMinutes());
            const offMin = -now.getTimezoneOffset();
            const offH = offMin / 60;
            const zone = 'UTC' + (offH >= 0 ? '+' : '') + offH;
            
            document.getElementById('info').innerText = `UTC ${utc} | ${zone}`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
